# HeyyPal v2 - NestJS, PostgreSQL, MongoDB, Redis, RabbitMQ
# Usage: docker compose -f docker-compose.nest.yml up -d
# Scale API: docker compose -f docker-compose.nest.yml up -d --scale api=2

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heyypal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heyypal}
      POSTGRES_DB: ${POSTGRES_DB:-heyypal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heyypal"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    environment:
      PORT: 5001
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-heyypal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heyypal}
      POSTGRES_DB: ${POSTGRES_DB:-heyypal}
      MONGO_URI: mongodb://mongodb:27017/heyypal
      REDIS_URI: redis://redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-default-32-byte-key-change-in-prod!!}
      FILE_STORAGE_PATH: /app/storage
      AGORA_APP_ID: ${AGORA_APP_ID:-}
      AGORA_APP_CERTIFICATE: ${AGORA_APP_CERTIFICATE:-}
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres: { condition: service_healthy }
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    # No host port: access via gateway (nginx) only. Use 5001:5001 if you need direct API access.
    # ports:
    #   - "5001:5001"

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-nest.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  api_storage:
