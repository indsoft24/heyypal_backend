# HeyyPal monorepo: Nest backend, admin_panel, nginx (PostgreSQL, MongoDB, Redis, RabbitMQ)
# Usage: docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PG_USER:-heyypal}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-heyypal}
      POSTGRES_DB: ${PG_DATABASE:-heyypal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heyypal -d heyypal"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DB:-heyypal}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    environment:
      PORT: 5001
      HOST: 0.0.0.0
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${PG_USER:-heyypal}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-heyypal}
      POSTGRES_DB: ${PG_DATABASE:-heyypal}
      MONGO_URI: mongodb://mongodb:27017/${MONGODB_DB:-heyypal}
      REDIS_URI: redis://redis:6379
      RABBITMQ_URI: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-default-32-byte-key-change-in-prod!!}
      FILE_STORAGE_PATH: /app/storage
      UPLOAD_DIR: /app/storage
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8080}
      ADMIN_SEED_EMAIL: ${ADMIN_SEED_EMAIL:-admin@heyypal.com}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-Admin123!}
      ADMIN_SEED_NAME: ${ADMIN_SEED_NAME:-Admin}
      # Allow browser requests from VPS/public URL (comma-separated; unset = allow all)
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000}
    volumes:
      - backend_storage:/app/storage
    ports:
      - "5001:5001"
    depends_on:
      postgres: { condition: service_healthy }
      mongodb: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  admin_panel:
    build:
      context: ./admin_panel
      dockerfile: Dockerfile
      args:
        # Use your VPS IP or domain so the browser can reach the API (e.g. http://187.77.191.120:8080)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - admin_panel

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  backend_storage:
